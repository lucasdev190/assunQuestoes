<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Questões</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Estilo para riscar o texto quando a tesoura for ativada */
        .alternativa-riscada {
            text-decoration: line-through;
            color: #9ca3af; /* Deixa o texto cinza claro */
        }
        /* Animação suave para a entrada da notificação flutuante */
        @keyframes slideIn {
            from {
                transform: translateY(-20px) scale(0.95);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }
        .animar-toast {
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 relative">

    <!-- CONTAINER DAS NOTIFICAÇÕES FLUTUANTES (TOASTS) -->
    <div id="container-notificacoes" class="fixed top-4 right-4 z-50 space-y-3 max-w-sm w-full pointer-events-none"></div>

    <!-- ================= TELA DE LOGIN / CADASTRO ================= -->
    <div id="tela-login" class="flex min-h-screen items-center justify-center px-4">
        <div class="bg-white p-8 rounded-lg shadow-md border max-w-md w-full space-y-6">
            <h2 id="login-titulo" class="text-2xl font-bold text-center text-blue-600">Plataforma de Questões</h2>
            
            <form id="form-auth" onsubmit="manipularAutenticacao(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">E-mail</label>
                    <input type="email" id="auth-email" required class="w-full p-2.5 border rounded-md text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Senha</label>
                    <input type="password" id="auth-senha" required class="w-full p-2.5 border rounded-md text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <button type="submit" id="btn-auth-enviar" class="w-full bg-blue-600 text-white py-2.5 rounded-md font-semibold hover:bg-blue-700 transition">
                    Entrar
                </button>
            </form>

            <div class="text-center text-sm text-gray-500">
                <span id="txt-alternar">Não tem uma conta?</span>
                <button onclick="alternarModoAuth()" id="btn-alternar" class="text-blue-600 font-semibold hover:underline ml-1">Cadastre-se</button>
            </div>
        </div>
    </div>

    <!-- ================= CONTEÚDO DO APP (COMEÇA ESCONDIDO) ================= -->
    <div id="conteudo-app" class="hidden">
        
        <!-- BARRA DE NAVEGAÇÃO SUPERIOR -->
        <nav class="bg-white shadow-sm border-b p-4 mb-6">
            <div class="max-w-5xl mx-auto flex justify-between items-center">
                <h1 class="text-xl font-bold text-blue-600">Plataforma de Questões</h1>
                <div class="flex gap-4 items-center">
                    <button onclick="mudarAba('questoes')" id="btn-aba-questoes" class="font-semibold text-blue-600 border-b-2 border-blue-600 pb-1">Questões</button>
                    <button onclick="mudarAba('estatisticas')" id="btn-aba-estatisticas" class="font-semibold text-gray-500 hover:text-blue-600 pb-1">Estatísticas (<span id="cont-total">0</span>)</button>
                    <!-- Botão de Sair -->
                    <button onclick="deslogar()" class="text-sm font-bold text-red-500 hover:text-red-700 ml-4">Sair</button>
                </div>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto px-4">
            
            <!-- ================= ABA DE QUESTÕES ================= -->
            <div id="aba-questoes" class="space-y-6">
                
                <!-- BARRA DE PESQUISA E FILTROS -->
                <div class="bg-white p-6 rounded-lg shadow-sm border space-y-4">
                    
                    <!-- Campos de Busca por Matéria e Assunto -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Pesquisar por Matéria</label>
                            <input type="text" id="busca-materia" oninput="limparTravaERenderizar()" placeholder="Digite a matéria... Ex: Geografia" class="w-full p-2 border rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Pesquisar por Assunto</label>
                            <input type="text" id="busca-assunto" oninput="limparTravaERenderizar()" placeholder="Digite o assunto... Ex: Clima" class="w-full p-2 border rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>

                    <hr class="border-gray-100">

                    <!-- Botões de Filtros de Status -->
                    <div class="flex flex-wrap gap-2 items-center">
                        <button onclick="filtrar('nao_resolvidas')" id="filt-nao_resolvidas" class="px-4 py-1.5 rounded-full text-sm bg-blue-600 text-white font-medium">Não resolvidas</button>
                        <button onclick="filtrar('certas')" id="filt-certas" class="px-4 py-1.5 rounded-full text-sm bg-gray-100 text-gray-600 hover:bg-gray-200 font-medium">Certas</button>
                        <button onclick="filtrar('erradas')" id="filt-erradas" class="px-4 py-1.5 rounded-full text-sm bg-gray-100 text-gray-600 hover:bg-gray-200 font-medium">Erradas</button>
                        <button onclick="resetarProgresso()" class="ml-auto px-4 py-1.5 rounded-full text-sm bg-red-100 text-red-600 hover:bg-red-200 font-bold transition">Resetar Abas</button>
                    </div>
                </div>

                <!-- CONTAINER DAS QUESTÕES DINÂMICAS -->
                <div id="lista-questoes" class="space-y-6">
                    <p class="text-gray-500 text-center py-8">Carregando questões do banco de dados...</p>
                </div>
            </div>

            <!-- ================= ABA SEPARADA: CONTADOR / DESEMPENHO ================= -->
            <div id="aba-estatisticas" class="hidden bg-white p-8 rounded-lg shadow-sm border max-w-xl mx-auto">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">Seu Histórico de Questões</h2>
                <div class="grid grid-cols-3 gap-4 text-center">
                    <div class="bg-blue-50 p-4 rounded-lg">
                        <span class="block text-2xl font-bold text-blue-600" id="stat-resolvidas">0</span>
                        <span class="text-sm text-gray-600">Total Resolvidas (Histórico)</span>
                    </div>
                    <div class="bg-green-50 p-4 rounded-lg">
                        <span class="block text-2xl font-bold text-green-600" id="stat-certas">0</span>
                        <span class="text-sm text-gray-600">Certas Atuais</span>
                    </div>
                    <div class="bg-red-50 p-4 rounded-lg">
                        <span class="block text-2xl font-bold text-red-600" id="stat-erradas">0</span>
                        <span class="text-sm text-gray-600">Erradas Atuais</span>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        // CONFIGURAÇÃO DO SUPABASE
        const SUPABASE_URL = "https://ykampvnnrkwvraxanunm.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrYW1wdm5ucmt3dnJheGFudW5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTY1MzMsImV4cCI6MjA5Njg3MjUzM30.CScVluXVuZQ31zLWolNFLREz4mH-Cu-YGxlw6YrfeY8"; 

        const bancoDeDados = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let bancoQuestoes = [];
        let filtroAtual = 'nao_resolvidas';
        let modoCadastro = false;
        let usuarioAtual = null;
        
        // Segura a questão respondida fixada na tela atual
        let questoesNaTelaQueForamRespondidas = [];
        // Guarda quais questões foram respondidas DE FATO nesta rodada atual da aba erradas
        let questoesRespondidasNaAbaErradasAgora = [];

        // ARRAYS DE CONTROLE DE PROGRESSO (ALIMENTADOS PELO BANCO DE DADOS)
        let totalResolvidasContador = 0;
        let certas = [];
        let erradas = [];


        // ================= FUNÇÃO DE MENSAGEM FLUTUANTE CUSTOMIZADA (TOASTS) =================
        function mostrarToast(mensagem, tipo = 'sucesso') {
            const container = document.getElementById('container-notificacoes');
            
            let config = {
                bg: 'bg-green-500',
                icone: '✨'
            };
            
            if (tipo === 'erro') {
                config.bg = 'bg-red-500';
                config.icone = '⚠️';
            } else if (tipo === 'aviso') {
                config.bg = 'bg-yellow-500';
                config.icone = 'ℹ️';
            }

            const toast = document.createElement('div');
            toast.className = `animar-toast pointer-events-auto flex items-center p-4 rounded-lg shadow-lg text-white ${config.bg} font-medium text-sm space-x-3 transition duration-300 transform`;
            toast.innerHTML = `
                <span class="text-lg">${config.icone}</span>
                <span class="flex-1">${mensagem}</span>
                <button onclick="this.parentElement.remove()" class="hover:opacity-75 transition font-bold text-sm">✕</button>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }


        // ================= FUNÇÕES DE AUTENTICAÇÃO (SESSÃO) =================

        function alternarModoAuth() {
            const titulo = document.getElementById('login-titulo');
            const botaoEnviar = document.getElementById('btn-auth-enviar');
            const txtAlternar = document.getElementById('txt-alternar');
            const btnAlternar = document.getElementById('btn-alternar');

            modoCadastro = !modoCadastro;

            if (modoCadastro) {
                titulo.innerText = "Criar Nova Conta";
                botaoEnviar.innerText = "Cadastrar";
                txtAlternar.innerText = "Já tem uma conta?";
                btnAlternar.innerText = "Entre aqui";
            } else {
                titulo.innerText = "Plataforma de Questões";
                botaoEnviar.innerText = "Entrar";
                txtAlternar.innerText = "Não tem uma conta?";
                btnAlternar.innerText = "Cadastre-se";
            }
        }

        async function manipularAutenticacao(event) {
            event.preventDefault();
            
            const email = document.getElementById('auth-email').value;
            const senha = document.getElementById('auth-senha').value;
            const botao = document.getElementById('btn-auth-enviar');

            botao.disabled = true;
            botao.innerText = modoCadastro ? "Cadastrando..." : "Entrando...";

            try {
                if (modoCadastro) {
                    const { data, error } = await bancoDeDados.auth.signUp({
                        email: email,
                        password: senha,
                    });
                    if (error) throw error;
                    
                    mostrarToast("Cadastro realizado! Confirme o e-mail ou faça seu login.", "sucesso");
                    alternarModoAuth();
                } else {
                    const { data, error } = await bancoDeDados.auth.signInWithPassword({
                        email: email,
                        password: senha,
                    });
                    if (error) throw error;
                    mostrarToast("Login realizado com sucesso! Bem-vindo.", "sucesso");
                }
            } catch (error) {
                mostrarToast(error.message, "erro");
            } finally {
                botao.disabled = false;
                botao.innerText = modoCadastro ? "Cadastrar" : "Entrar";
                document.getElementById('form-auth').reset();
            }
        }

        bancoDeDados.auth.onAuthStateChange(async (event, session) => {
            const telaLogin = document.getElementById('tela-login');
            const conteudoApp = document.getElementById('conteudo-app');

            if (session) {
                usuarioAtual = session.user;
                telaLogin.classList.add('hidden');
                conteudoApp.classList.remove('hidden');
                
                await baixarProgresso();
                if (bancoQuestoes.length === 0) {
                    await baixarQuestoes();
                }
            } else {
                usuarioAtual = null;
                telaLogin.classList.remove('hidden');
                conteudoApp.classList.add('hidden');
                bancoQuestoes = []; 
                certas = [];
                erradas = [];
                totalResolvidasContador = 0;
            }
        });

        async function deslogar() {
            await bancoDeDados.auth.signOut();
            mostrarToast("Você saiu da plataforma.", "aviso");
        }

        // ================= FUNÇÕES DO BANCO DE DADOS E RENDERS =================

        async function baixarProgresso() {
            if (!usuarioAtual) return;
            try {
                const { data, error } = await bancoDeDados
                    .from('progresso')
                    .select('questao_id, status')
                    .eq('user_id', usuarioAtual.id);
                
                if (error) throw error;

                certas = [];
                erradas = [];
                
                data.forEach(item => {
                    if (item.status === 'certas') {
                        certas.push(item.questao_id);
                    } else if (item.status === 'erradas') {
                        erradas.push(item.questao_id);
                    }
                });

                totalResolvidasContador = data.length; 
                atualizarContadores();
            } catch (error) {
                console.error("Erro ao carregar progresso:", error.message);
            }
        }

        async function baixarQuestoes() {
            try {
                const { data, error } = await bancoDeDados
                    .from('questoes')
                    .select('*')
                    .order('id', { ascending: false });
                
                if (error) throw error;
                bancoQuestoes = data;
                renderizarQuestoes();
                atualizarContadores();
            } catch (error) {
                document.getElementById('lista-questoes').innerHTML = `<p class="text-red-500 text-center">Erro ao carregar dados do banco: ${error.message}</p>`;
            }
        }

        function renderizarQuestoes() {
            const container = document.getElementById('lista-questoes');
            container.innerHTML = '';

            const buscaMateria = document.getElementById('busca-materia').value.toLowerCase().trim();
            const buscaAssunto = document.getElementById('busca-assunto').value.toLowerCase().trim();

            const questoesFiltradas = bancoQuestoes.filter(q => {
                const bateMateria = q.materia ? q.materia.toLowerCase().includes(buscaMateria) : true;
                const bateAssunto = q.assunto ? q.assunto.toLowerCase().includes(buscaAssunto) : true;
                if (!bateMateria || !bateAssunto) return false;

                if (questoesNaTelaQueForamRespondidas.includes(q.id)) return true;

                if (filtroAtual === 'nao_resolvidas') return !certas.includes(q.id) && !erradas.includes(q.id);
                if (filtroAtual === 'certas') return certas.includes(q.id);
                if (filtroAtual === 'erradas') return erradas.includes(q.id);
                return true;
            });

            if (questoesFiltradas.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center py-8">Nenhuma questão encontrada com esses filtros ou buscas.</p>';
                return;
            }

            questoesFiltradas.forEach((q) => {
                const acertouAinda = certas.includes(q.id);
                const errouAinda = erradas.includes(q.id);
                
                let travarInputs = false;
                let mostrarExplicacao = false;

                if (questoesNaTelaQueForamRespondidas.includes(q.id) || acertouAinda || (errouAinda && filtroAtual !== 'erradas')) {
                    travarInputs = true;
                    mostrarExplicacao = true;
                }

                let card = document.createElement('div');
                card.className = "bg-white p-6 rounded-lg shadow-sm border space-y-4";
                card.innerHTML = `
                    <div class="text-xs text-blue-600 font-semibold space-x-2">
                        <span>#${q.id}</span> • <span class="bg-blue-50 px-2 py-0.5 rounded text-blue-700">${q.materia}</span> • <span class="bg-gray-100 px-2 py-0.5 rounded text-gray-700">${q.assunto}</span>
                    </div>
                    <div class="text-gray-800 text-base font-medium whitespace-pre-line">${q.enunciado}</div>
                    
                    <!-- Alternativas -->
                    <div class="space-y-2" id="alternativas-${q.id}">
                        ${['a', 'b', 'c', 'd', 'e'].map(letra => {
                            if(!q[`alternativa_${letra}`]) return '';
                            const idUnicoRisco = `texto-${q.id}-${letra}`;
                            return `
                                <div class="flex items-center gap-2 w-full">
                                    <button onclick="alternarRisco('${idUnicoRisco}')" title="Eliminar alternativa" class="p-1.5 hover:bg-gray-100 rounded text-gray-400 hover:text-red-500 transition text-sm">
                                        ✂️
                                    </button>
                                    
                                    <label class="flex items-center gap-3 p-3 border rounded-md cursor-pointer hover:bg-gray-50 transition w-full">
                                        <input type="radio" name="q-${q.id}" value="${letra.toUpperCase()}" ${travarInputs ? 'disabled' : ''} class="w-4 h-4 text-blue-600">
                                        <span class="font-bold text-gray-500">${letra.toUpperCase()})</span>
                                        <span id="${idUnicoRisco}">${q[`alternativa_${letra}`]}</span>
                                    </label>
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- Botão Responder / Feedback -->
                    <div class="flex items-center gap-4" id="feedback-area-${q.id}">
                        ${!travarInputs ? `
                            <button onclick="validarResposta(${q.id})" id="btn-${q.id}" class="bg-blue-600 text-white px-6 py-2 rounded font-semibold text-sm hover:bg-blue-700 transition">
                                Responder
                            </button>
                        ` : ''}
                        ${acertouAinda ? `<span class="text-sm font-bold text-green-600">✓ Você acertou!</span>` : ''}
                        ${errouAinda && !acertouAinda ? `<span class="text-sm font-bold text-red-600">✕ Resposta incorreta!</span>` : ''}
                    </div>

                    <!-- Caixa de explicação -->
                    <div id="explicacao-${q.id}" class="${mostrarExplicacao ? '' : 'hidden'} bg-yellow-50 border border-yellow-200 p-4 rounded-md mt-4 text-sm text-gray-700">
                        <strong class="block text-yellow-800 mb-1">Explicação (Alternativa Correta: ${q.correta}):</strong>
                        ${q.explicacao}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function alternarRisco(idElemento) {
            const elementoTexto = document.getElementById(idElemento);
            if (elementoTexto) {
                elementoTexto.classList.toggle('alternativa-riscada');
            }
        }

        async function validarResposta(id) {
            const radioSelecionado = document.querySelector(`input[name="q-${id}"]:checked`);
            if (!radioSelecionado) {
                mostrarToast("Selecione uma alternativa antes de responder!", "aviso");
                return;
            }

            const respostaUsuario = radioSelecionado.value;
            const questao = bancoQuestoes.find(q => q.id === id);
            const acertouAgora = (respostaUsuario === questao.correta.toUpperCase());
            const novoStatus = acertouAgora ? 'certas' : 'erradas';

            if (acertouAgora) {
                if (!certas.includes(id)) certas.push(id);
                erradas = erradas.filter(item => item !== id);
                mostrarToast("Excelente! Alternativa correta.", "sucesso");
            } else {
                if (!erradas.includes(id)) erradas.push(id);
                mostrarToast("Que pena, alternativa incorreta! Estude a explicação.", "erro");
            }

            if (!questoesNaTelaQueForamRespondidas.includes(id)) {
                questoesNaTelaQueForamRespondidas.push(id);
            }

            totalResolvidasContador++;
            atualizarContadores();
            renderizarQuestoes();

            try {
                const { data: registroExistente } = await bancoDeDados
                    .from('progresso')
                    .select('id')
                    .eq('user_id', usuarioAtual.id)
                    .eq('questao_id', id)
                    .maybeSingle();

                if (registroExistente) {
                    await bancoDeDados
                        .from('progresso')
                        .update({ status: novoStatus })
                        .eq('id', registroExistente.id);
                } else {
                    await bancoDeDados
                        .from('progresso')
                        .insert({ questao_id: id, status: novoStatus });
                }
            } catch (error) {
                console.error("Erro ao salvar progresso no banco:", error.message);
            }
        }

        function limparTravaERenderizar() {
            questoesNaTelaQueForamRespondidas = [];
            questoesRespondidasNaAbaErradasAgora = [];
            renderizarQuestoes();
        }

        async function resetarProgresso() {
            if(confirm("Deseja limpar as abas? As questões voltarão para 'Não resolvidas' tanto na tela quanto no banco de dados.")) {
                try {
                    const { error } = await bancoDeDados
                        .from('progresso')
                        .delete()
                        .eq('user_id', usuarioAtual.id);
                    
                    if (error) throw error;

                    certas = []; 
                    erradas = [];
                    totalResolvidasContador = 0;
                    questoesNaTelaQueForamRespondidas = [];
                    questoesRespondidasNaAbaErradasAgora = [];
                    
                    atualizarContadores();
                    renderizarQuestoes();
                    mostrarToast("Abas de progresso resetadas com sucesso!", "sucesso");
                } catch (error) {
                    mostrarToast("Erro ao resetar progresso no banco: " + error.message, "erro");
                }
            }
        }

        function atualizarContadores() {
            document.getElementById('cont-total').innerText = totalResolvidasContador;
            document.getElementById('stat-resolvidas').innerText = totalResolvidasContador;
            document.getElementById('stat-certas').innerText = certas.length;
            document.getElementById('stat-erradas').innerText = erradas.length;
        }

        function filtrar(tipo) {
            filtroAtual = tipo;
            questoesNaTelaQueForamRespondidas = []; 
            questoesRespondidasNaAbaErradasAgora = [];
            
            ['nao_resolvidas', 'certas', 'erradas'].forEach(f => {
                const btn = document.getElementById(`filt-${f}`);
                if(f === tipo) {
                    btn.className = "px-4 py-1.5 rounded-full text-sm bg-blue-600 text-white font-medium";
                } else {
                    btn.className = "px-4 py-1.5 rounded-full text-sm bg-gray-100 text-gray-600 hover:bg-gray-200 font-medium";
                }
            });
            renderizarQuestoes();
        }

        function mudarAba(aba) {
            questoesNaTelaQueForamRespondidas = []; 
            questoesRespondidasNaAbaErradasAgora = [];
            
            if(aba === 'questoes') {
                document.getElementById('aba-questoes').classList.remove('hidden');
                document.getElementById('aba-estatisticas').classList.add('hidden');
                document.getElementById('btn-aba-questoes').className = "font-semibold text-blue-600 border-b-2 border-blue-600 pb-1";
                document.getElementById('btn-aba-estatisticas').className = "font-semibold text-gray-500 hover:text-blue-600 pb-1";
                renderizarQuestoes();
            } else {
                document.getElementById('aba-questoes').classList.add('hidden');
                document.getElementById('aba-estatisticas').classList.remove('hidden');
                document.getElementById('btn-aba-questoes').className = "font-semibold text-gray-500 hover:text-blue-600 pb-1";
                document.getElementById('btn-aba-estatisticas').className = "font-semibold text-blue-600 border-b-2 border-blue-600 pb-1";
            }
        }
    </script>
</body>
</html>
